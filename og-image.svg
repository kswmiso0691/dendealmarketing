<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2"/>
      <stop offset="40%" style="stop-color:#2e7df6"/>
      <stop offset="100%" style="stop-color:#5ba3f5"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 장식 원 -->
  <circle cx="1100" cy="80" r="200" fill="rgba(255,255,255,0.06)"/>
  <circle cx="100" cy="580" r="150" fill="rgba(255,255,255,0.04)"/>
  <circle cx="950" cy="550" r="100" fill="rgba(255,255,255,0.03)"/>

  <!-- ALL FREE 배지 -->
  <rect x="960" y="35" width="180" height="48" rx="24" fill="#e74c3c"/>
  <text x="1050" y="66" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="22" font-weight="800" letter-spacing="2">ALL FREE</text>

  <!-- SPECIAL EVENT 배지 -->
  <rect x="460" y="100" width="280" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
  <text x="600" y="127" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="17" font-weight="600" letter-spacing="3">SPECIAL EVENT</text>

  <!-- 메인 타이틀 -->
  <text x="600" y="215" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="52" font-weight="800">거래처 원장님께 드리는</text>
  <text x="600" y="280" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="52" font-weight="800">특별한 혜택</text>

  <!-- 서브 텍스트 -->
  <text x="600" y="340" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial,sans-serif" font-size="24" font-weight="300">소중한 인연에 보답하고자 준비한</text>
  <text x="600" y="375" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial,sans-serif" font-size="24" font-weight="300">거래처 전용 무료 혜택입니다</text>

  <!-- 혜택 태그들 -->
  <rect x="108" y="430" width="200" height="46" rx="23" fill="rgba(255,255,255,0.18)"/>
  <text x="208" y="460" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="600">재료 10% 할인</text>

  <rect x="340" y="430" width="210" height="46" rx="23" fill="rgba(255,255,255,0.18)"/>
  <text x="445" y="460" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="600">임플란트 최저가</text>

  <rect x="582" y="430" width="190" height="46" rx="23" fill="rgba(255,255,255,0.18)"/>
  <text x="677" y="460" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="600">뉴스 마케팅</text>

  <rect x="804" y="430" width="200" height="46" rx="23" fill="rgba(255,255,255,0.18)"/>
  <text x="904" y="460" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="600">홈페이지 제작</text>

  <!-- 하단 라인 -->
  <rect x="550" y="520" width="100" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <text x="600" y="570" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Arial,sans-serif" font-size="16" font-weight="400">방문 예약 신청하기</text>
</svg>
